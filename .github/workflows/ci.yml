name: CI
on:
  push:
    branches:
      - main
  pull_request: null
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - &id001
        name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 'backend/package-lock.json

            '
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Validate backend types
        run: npm run check
        working-directory: backend
      - name: Validate shell scripts
        run: bash -n ./scripts/*.sh
      - name: Validate Docker Compose
        run: docker compose config --quiet
      - name: Run backend unit tests
        run: npm run test:unit
        working-directory: backend
  storefront:
    runs-on: ubuntu-latest
    steps:
      - *id001
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 'storefront/package-lock.json

            '
      - name: Install storefront dependencies
        run: npm ci
        working-directory: storefront
      - name: Validate storefront types
        run: npm run check
        working-directory: storefront
      - name: Run storefront unit tests
        run: npm run test:unit
        working-directory: storefront
