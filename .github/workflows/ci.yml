name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            storefront/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install storefront dependencies
        run: npm ci
        working-directory: storefront

      - name: Validate backend types
        run: npm run check
        working-directory: backend

      - name: Validate storefront types
        run: npm run check
        working-directory: storefront

      - name: Validate shell scripts
        run: bash -n ./scripts/*.sh

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          postgres_ready=0
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U medusa -d medusa_b2c; then
              postgres_ready=1
              break
            fi
            sleep 2
          done
          if [ $postgres_ready -eq 0 ]; then
            echo "PostgreSQL did not become ready in time"
            /bin/false
          fi

          echo "Waiting for Redis to be ready..."
          redis_ready=0
          for i in {1..30}; do
            if docker compose exec -T redis redis-cli ping | grep -q PONG; then
              redis_ready=1
              break
            fi
            sleep 2
          done
          if [ $redis_ready -eq 0 ]; then
            echo "Redis did not become ready in time"
            /bin/false
          fi

      - name: Run backend unit tests
        run: npm run test:unit
        working-directory: backend

      - name: Run backend integration tests
        run: npm run test:integration:http
        working-directory: backend
        env:
          DATABASE_URL: postgres://medusa:medusa@localhost:15432/medusa_b2c
          REDIS_URL: redis://localhost:16379
          DB_HOST: localhost
          DB_PORT: 15432
          DB_USERNAME: medusa
          DB_PASSWORD: medusa

      - name: Run storefront unit tests
        run: npm run test:unit
        working-directory: storefront

      - name: Build and Start Backend for E2E
        run: |
          npx medusa db:migrate
          npm run seed
          npm run build
          PORT=9000 DISABLE_MEDUSA_ADMIN=true npm run start &
          backend_ready=0
          for i in {1..30}; do
            if curl -fsS http://localhost:9000/health > /dev/null; then
              echo "Backend is ready!"
              backend_ready=1
              break
            fi
            sleep 2
          done
          if [ $backend_ready -eq 0 ]; then
            echo "Backend did not become ready in time"
            /bin/false
          fi
        working-directory: backend
        env:
          DATABASE_URL: postgres://medusa:medusa@localhost:15432/medusa_b2c
          REDIS_URL: redis://localhost:16379

      - name: Run storefront E2E tests
        run: |
          npx playwright install --with-deps
          npm run test:e2e
        working-directory: storefront
        env:
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_test_12345
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
