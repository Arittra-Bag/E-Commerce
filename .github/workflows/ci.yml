name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            storefront/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install storefront dependencies
        run: npm ci
        working-directory: storefront

      - name: Validate backend types
        run: npm run check
        working-directory: backend

      - name: Validate storefront types
        run: npm run check
        working-directory: storefront

      - name: Validate shell scripts
        run: bash -n ./scripts/*.sh

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          postgres_ready=0
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U medusa -d medusa_b2c; then
              postgres_ready=1
              break
            fi
            sleep 2
          done
          if [ $postgres_ready -eq 0 ]; then
            echo "PostgreSQL did not become ready in time"
            exit 1
          fi

          echo "Waiting for Redis to be ready..."
          redis_ready=0
          for i in {1..30}; do
            if docker compose exec -T redis redis-cli ping | grep -q PONG; then
              redis_ready=1
              break
            fi
            sleep 2
          done
          if [ $redis_ready -eq 0 ]; then
            echo "Redis did not become ready in time"
            exit 1
          fi

      - name: Run backend unit tests
        run: npm run test:unit
        working-directory: backend

      - name: Run backend integration tests
        run: npm run test:integration:http
        working-directory: backend

      - name: Run storefront unit tests
        run: npm run test:unit
        working-directory: storefront
